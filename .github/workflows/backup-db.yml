name: Backup DB diario

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC = 3am Argentina (UTC-3)
  workflow_dispatch:       # Permite ejecución manual desde GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnupg postgresql-client

      - name: Generar backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          DUMP="backup_${TIMESTAMP}.sql.gz"
          pg_dump "${{ secrets.DATABASE_URL }}" --no-owner --no-acl | gzip > "$DUMP"
          echo "DUMP=$DUMP" >> $GITHUB_ENV
          echo "Backup generado: $DUMP ($(du -h "$DUMP" | cut -f1))"

      - name: Cifrar con GPG
        run: |
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 \
            --symmetric --cipher-algo AES256 "${{ env.DUMP }}"
          rm -f "${{ env.DUMP }}"
          echo "Cifrado: ${{ env.DUMP }}.gpg"
          ls -lh "${{ env.DUMP }}.gpg"

      - name: Enviar a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          GPG="${{ env.DUMP }}.gpg"
          SIZE=$(stat -c%s "$GPG")
          SIZE_HUMAN=$(numfmt --to=iec $SIZE)
          DATE=$(date '+%d/%m/%Y %H:%M')
          curl -s -F chat_id="$CHAT_ID" \
            -F document=@"$GPG" \
            -F caption="✅ Backup completado
        Fecha: $DATE
        Tamaño: $SIZE_HUMAN
        Cifrado: AES256
        Archivo: $GPG" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendDocument"

      - name: Notificar error
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$CHAT_ID\",\"text\":\"❌ Backup FALLÓ
        Repo: ${{ github.repository }}
        Run: $RUN_URL\"}" \
            "https://api.telegram.org/bot$BOT_TOKEN/sendMessage"
