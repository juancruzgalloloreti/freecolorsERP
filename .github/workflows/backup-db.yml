name: Backup DB diario

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnupg postgresql-client

      - name: Generar backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          DUMP="backup_${TIMESTAMP}.sql.gz"
          pg_dump "${{ secrets.DATABASE_URL }}" --no-owner --no-acl | gzip > "$DUMP"
          echo "DUMP=$DUMP" >> $GITHUB_ENV
          echo "Generado: $DUMP ($(du -h "$DUMP" | cut -f1))"

      - name: Cifrar con GPG
        run: |
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --passphrase-fd 0 \
            --symmetric --cipher-algo AES256 "${{ env.DUMP }}"
          rm -f "${{ env.DUMP }}"

      - name: Enviar a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          GPG="${{ env.DUMP }}.gpg"
          SIZE=$(du -h "$GPG" | cut -f1)
          DATE=$(date '+%d/%m/%Y %H:%M')
          CAPTION="✅ Backup FreeColors ERP | $DATE | $SIZE | AES256"
          curl -s -F chat_id="$CHAT_ID" \
            -F document=@"$GPG" \
            -F caption="$CAPTION" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      - name: Notificar error
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"❌ Backup FALLÓ: ${RUN_URL}\"}" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"
